<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kingscote Haulage</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      background-color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-wrap {
      clip-path: inset(0 100% 0 0);
      animation: revealLTR 1.4s cubic-bezier(0.76, 0, 0.24, 1) 0.3s forwards;
    }

    .logo-wrap img {
      display: block;
      height: 72px;
      width: auto;
    }

    @keyframes revealLTR {
      from { clip-path: inset(0 100% 0 0); }
      to   { clip-path: inset(0 0% 0 0); }
    }

    body.leaving {
      animation: fadeOut 0.5s ease forwards;
    }

    @keyframes fadeOut {
      from { opacity: 1; }
      to   { opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="logo-wrap">
    <img src="kingscotelogoclear2.png" alt="Kingscote Haulage">
  </div>

  <script>
    // If the user has visited before, skip the click-to-enter and go straight to home
    if (localStorage.getItem('kh_visited')) {
      window.location.replace('home.html');
    }

    document.addEventListener('click', leave);
    document.addEventListener('touchstart', leave);

    function leave() {
      document.removeEventListener('click', leave);
      document.removeEventListener('touchstart', leave);
      // Mark as visited so future loads skip this splash
      localStorage.setItem('kh_visited', '1');
      // Tell the next page to skip its splash (coming straight from entry)
      sessionStorage.setItem('kh_skip_splash', '1');
      document.body.classList.add('leaving');
      setTimeout(function() {
        window.location.href = 'home.html';
      }, 500);
    }
  </script>

</body>
</html>
